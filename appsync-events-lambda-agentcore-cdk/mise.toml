[env]
_.python.venv = { path = ".venv", create = true }
CDK_DOCKER = "finch"
AWS_REGION = "eu-west-1"
STACK_NAME = "AppsyncLambdaAgentcore"

[tools]
node = "22"
python = "3.14"
uv = "latest"
"npm:aws-cdk" = "2.1110"

[tasks.init]
description = "Initialise the environment"
run = [
    "for f in functions/*/requirements.txt agents/*/requirements.txt requirements.txt requirements-dev.txt; do [ -f \"$f\" ] && uv pip install -r \"$f\"; done",
    "cdk bootstrap"
]
run_windows = [
    "uv pip install -r requirements.txt",
    "uv pip install -r requirements-dev.txt",
    "cdk bootstrap"
]

[tasks.clean]
description = "Remove build artifacts and dependencies"
run = [
  "rm -rf .venv cdk.out",
  "find . -type d \\( -name '__pycache__' -o -name '.pytest_cache' \\) -exec rm -rf {} +"
]
run_windows = "echo Not implemented"

[tasks."cdk:synth"]
description = "Synthesize CDK Stack"
run = "cdk synth -c stack_name=$STACK_NAME"

[tasks."cdk:sync"]
description = "Sync CDK Stack - Development only"
run = "cdk deploy --watch -c stack_name=$STACK_NAME"

[tasks."cdk:deploy"]
description = "Deploy CDK Stack"
run = "cdk deploy --require-approval never -c stack_name=$STACK_NAME"

[tasks.deploy]
description = "Install dependencies, bootstrap, and deploy"
depends = "init"
depends_post = "cdk:deploy"

[tasks."cdk:destroy"]
description = "Destroy CDK Stack"
run = "cdk destroy -c stack_name=$STACK_NAME"

[tasks.destroy]
description = "Destroy stack and clean up orphaned CloudWatch log groups"
run = """
echo "Collecting log group names from stack $STACK_NAME..."

# AppSync API log group — extract API ID from ARN
APPSYNC_ARN=$(aws cloudformation list-stack-resources --stack-name $STACK_NAME --region $AWS_REGION \
  --query "StackResourceSummaries[?ResourceType=='AWS::AppSync::Api'].PhysicalResourceId" --output text)
APPSYNC_API_ID=$(echo "$APPSYNC_ARN" | grep -oE '[^/]+$')
APPSYNC_LG="/aws/appsync/apis/$APPSYNC_API_ID"

# AgentCore Runtime log group
RUNTIME_ID=$(aws cloudformation list-stack-resources --stack-name $STACK_NAME --region $AWS_REGION \
  --query "StackResourceSummaries[?ResourceType=='AWS::BedrockAgentCore::Runtime'].PhysicalResourceId" --output text)
AGENTCORE_LG="/aws/bedrock-agentcore/runtimes/${RUNTIME_ID}-DEFAULT"

# S3 Auto-Delete custom resource Lambda log group
S3_AUTO_DELETE_FN=$(aws cloudformation list-stack-resources --stack-name $STACK_NAME --region $AWS_REGION \
  --query "StackResourceSummaries[?ResourceType=='AWS::Lambda::Function' && contains(LogicalResourceId,'CustomS3AutoDelete')].PhysicalResourceId" --output text)
S3_AUTO_DELETE_LG="/aws/lambda/$S3_AUTO_DELETE_FN"

# Log Retention Lambda log group
LOG_RETENTION_FN=$(aws cloudformation list-stack-resources --stack-name $STACK_NAME --region $AWS_REGION \
  --query "StackResourceSummaries[?ResourceType=='AWS::Lambda::Function' && contains(LogicalResourceId,'LogRetention')].PhysicalResourceId" --output text)
LOG_RETENTION_LG="/aws/lambda/$LOG_RETENTION_FN"

LOG_GROUPS="$APPSYNC_LG $AGENTCORE_LG $S3_AUTO_DELETE_LG $LOG_RETENTION_LG"

echo "Log groups to clean up after destroy:"
for lg in $LOG_GROUPS; do echo "  $lg"; done

mise run cdk:destroy

echo "Deleting orphaned log groups..."
for lg in $LOG_GROUPS; do
  if aws logs describe-log-groups --log-group-name-prefix "$lg" --region $AWS_REGION --query "logGroups[?logGroupName=='$lg'].logGroupName" --output text | grep -q .; then
    echo "Deleting $lg"
    aws logs delete-log-group --log-group-name "$lg" --region $AWS_REGION
  fi
done
echo "Done."
"""
run_windows = "echo Not implemented"

[tasks.test]
run = [
    "mise run test:unit",
    "mise run test:integration"
]

[tasks."test:unit"]
run = "pytest tests/unit -v"

[tasks."test:integration"]
run = "pytest tests/integration -v" 

[tasks."test:integration:verbose"]
description = "Run integration tests with WebSocket output visible"
run = "pytest tests/integration -v -s"
