<svg xmlns="http://www.w3.org/2000/svg" width="720" height="320" viewBox="0 0 720 320">
  <defs>
    <style>text{font-family:Arial,sans-serif;font-size:13px;fill:#232f3e}.title{font-size:11px;font-weight:bold}.box{stroke:#232f3e;stroke-width:2;rx:8;ry:8}.arrow{stroke:#232f3e;stroke-width:2;fill:none;marker-end:url(#ah)}</style>
    <marker id="ah" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0,10 3.5,0 7" fill="#232f3e"/></marker>
  </defs>
  <rect x="20" y="120" width="130" height="60" class="box" fill="#f2f3f3"/>
  <text x="50" y="145" class="title">Publisher</text>
