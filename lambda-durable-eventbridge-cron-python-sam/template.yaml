AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Durable Lambda function triggered by an EventBridge Scheduler cron schedule every 1 minute

Globals:
  Function:
    Timeout: 900
    MemorySize: 256
    Runtime: python3.14

Resources:
  # Durable Lambda function — publishes a new version on each deploy
  DurableCronFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: lambda_function.lambda_handler
      CodeUri: src/
      AutoPublishAlias: live
      DurableConfig:
        ExecutionTimeout: 900
        RetentionPeriodInDays: 7
      Description: Durable execution Lambda triggered every minute by EventBridge Scheduler
      Policies:
        - Statement:
            - Effect: Allow
              Action:
                - lambda:InvokeFunction
              Resource: !Sub arn:aws:lambda:${AWS::Region}:${AWS::AccountId}:function:*

  # IAM role for EventBridge Scheduler to invoke the Lambda alias
  SchedulerExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: scheduler.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: InvokeLambdaPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - lambda:InvokeFunction
                Resource: !Ref DurableCronFunction.Alias

  # EventBridge Scheduler — every minute cron schedule
  HourlyCronSchedule:
    Type: AWS::Scheduler::Schedule
    Properties:
      Description: Triggers the durable Lambda function every minute
      ScheduleExpression: cron(* * * * ? *)
      FlexibleTimeWindow:
        Mode: 'OFF'
      State: ENABLED
      Target:
        Arn: !Ref DurableCronFunction.Alias
        RoleArn: !GetAtt SchedulerExecutionRole.Arn

Outputs:
  DurableCronFunctionAliasArn:
    Description: ARN of the live alias (published version)
    Value: !Ref DurableCronFunction.Alias
  PublishedVersion:
    Description: Latest published version number
    Value: !Ref DurableCronFunction.Version
  DurableCronFunctionName:
    Description: Name of the durable cron Lambda function
    Value: !Ref DurableCronFunction
  HourlyCronScheduleArn:
    Description: ARN of the EventBridge Scheduler every-minute cron schedule
    Value: !GetAtt HourlyCronSchedule.Arn
