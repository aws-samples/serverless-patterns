AWSTemplateFormatVersion: '2010-09-09'
Description: Lambda MicroVM from a zip artifact (Dockerfile + app code)

Parameters:
  S3Bucket:
    Type: String
    Description: S3 bucket containing the code artifact zip
  S3Key:
    Type: String
    Description: S3 key for the code artifact zip
  ImageName:
    Type: String
    Default: from-zip
    AllowedPattern: ^[a-zA-Z0-9-_]+$

Resources:
  MicroVMRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${ImageName}-role"
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action:
              - sts:AssumeRole
              - sts:TagSession
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonS3ReadOnlyAccess
        - arn:aws:iam::aws:policy/CloudWatchLogsFullAccess

  MicroVMImage:
    Type: AWS::Lambda::MicrovmImage
    DependsOn: MicroVMRole
    Properties:
      Name: !Ref ImageName
      BaseImageArn: !Sub "arn:aws:lambda:${AWS::Region}:aws:microvm-image:al2023-1"
      BaseImageVersion: "0"
      BuildRoleArn: !GetAtt MicroVMRole.Arn
      CodeArtifact:
        Uri: !Sub "s3://${S3Bucket}/${S3Key}"
      CpuConfigurations:
        - Architecture: ARM_64
      AdditionalOsCapabilities:
        - ALL
      Description: MicroVM from zip artifact
      EgressNetworkConnectors: []
      EnvironmentVariables: []
      Hooks:
        Port: 9000
        MicrovmImageHooks:
          Ready: ENABLED
          ReadyTimeoutInSeconds: 60
        MicrovmHooks:
          Run: ENABLED
          RunTimeoutInSeconds: 5
          Resume: ENABLED
          ResumeTimeoutInSeconds: 5
          Suspend: ENABLED
          SuspendTimeoutInSeconds: 5
          Terminate: ENABLED
          TerminateTimeoutInSeconds: 5
      Logging:
        CloudWatch:
          LogGroup: !Sub "/aws/lambda-microvms/${ImageName}"
      Resources:
        - MinimumMemoryInMiB: 512

Outputs:
  ImageArn:
    Value: !GetAtt MicroVMImage.ImageArn
  State:
    Value: !GetAtt MicroVMImage.State
  RoleArn:
    Value: !GetAtt MicroVMRole.Arn
