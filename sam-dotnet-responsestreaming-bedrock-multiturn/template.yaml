AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: >
  Multi-turn AI Trip Planner agent using Amazon Bedrock (Claude Sonnet) with
  Lambda Response Streaming through API Gateway. The agent can ask the user
  clarifying questions before generating the itinerary, persisting conversation
  state in DynamoDB between requests.

Globals:
  Function:
    Timeout: 900
    MemorySize: 512
    Runtime: dotnet10
    Architectures:
      - x86_64

Resources:
  # ─────────────────────────────────────────────────────────────────────
  # DynamoDB Table — conversation session store with TTL
  # ─────────────────────────────────────────────────────────────────────
  SessionTable:
    Type: AWS::DynamoDB::Table
    Properties:
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: SessionId
          AttributeType: S
      KeySchema:
        - AttributeName: SessionId
          KeyType: HASH
      TimeToLiveSpecification:
        AttributeName: ExpiresAt
        Enabled: true
    DeletionPolicy: Delete

  # ─────────────────────────────────────────────────────────────────────
  # REST API with response streaming
  # ─────────────────────────────────────────────────────────────────────
  TripApi:
    Type: AWS::ApiGateway::RestApi
    Properties:
      Name: trip-planner-multiturn-api
      Description: Multi-turn AI trip planner with response streaming

  PlanResource:
    Type: AWS::ApiGateway::Resource
    Properties:
      RestApiId: !Ref TripApi
      ParentId: !GetAtt TripApi.RootResourceId
      PathPart: plan

  PlanMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref TripApi
      ResourceId: !Ref PlanResource
      HttpMethod: POST
      AuthorizationType: NONE
      Integration:
        Type: AWS_PROXY
        IntegrationHttpMethod: POST
        ResponseTransferMode: STREAM
        TimeoutInMillis: 900000
        Uri: !Sub arn:aws:apigateway:${AWS::Region}:lambda:path/2021-11-15/functions/${TripPlannerFunction.Arn}/response-streaming-invocations

  ApiDeployment:
    Type: AWS::ApiGateway::Deployment
    DependsOn: PlanMethod
    Properties:
      RestApiId: !Ref TripApi

  ApiStage:
    Type: AWS::ApiGateway::Stage
    Properties:
      RestApiId: !Ref TripApi
      DeploymentId: !Ref ApiDeployment
      StageName: prod

  # ─────────────────────────────────────────────────────────────────────
  # Lambda Function — multi-turn trip planner agent
  # ─────────────────────────────────────────────────────────────────────
  TripPlannerFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: TripPlannerMultiturn
      CodeUri: ./src/
      Description: Multi-turn AI trip planner with session persistence and response streaming
      Environment:
        Variables:
          SESSION_TABLE_NAME: !Ref SessionTable
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref SessionTable
        - Statement:
            - Effect: Allow
              Action:
                - bedrock:InvokeModelWithResponseStream
                - bedrock:InvokeModel
              Resource: "*"

  TripPlannerFunctionPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !GetAtt TripPlannerFunction.Arn
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${TripApi}/*

Outputs:
  ApiEndpoint:
    Description: API Gateway endpoint URL for the trip planner
    Value: !Sub "https://${TripApi}.execute-api.${AWS::Region}.amazonaws.com/prod/plan"
  SessionTableName:
    Description: DynamoDB table for conversation sessions
    Value: !Ref SessionTable
  TripPlannerFunctionArn:
    Description: Trip planner Lambda function ARN
    Value: !GetAtt TripPlannerFunction.Arn
