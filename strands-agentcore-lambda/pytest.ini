[pytest]
# Pytest configuration for Serverless AI Agent Gateway

# Test discovery patterns
python_files = test_*.py *_test.py
python_classes = Test*
python_functions = test_*

# Test paths
testpaths = tests

# Output options
addopts = 
    -v
    --strict-markers
    --tb=short
    --disable-warnings

# Markers for test categorization
markers =
    unit: Unit tests for individual components
    property: Property-based tests using Hypothesis
    integration: Integration tests across components
    e2e: End-to-end system tests
    slow: Tests that take significant time to run

# Coverage options
[coverage:run]
source = src
omit = 
    */tests/*
    */venv/*
    */__pycache__/*

[coverage:report]
precision = 2
show_missing = True
skip_covered = False

# Hypothesis settings
[hypothesis]
max_examples = 100
deadline = None
